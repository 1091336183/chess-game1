<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单测试</title>
    <style>
        body { font-family: 'Microsoft YaHei', sans-serif; }
        #chessboard {
            width: 600px;
            height: 660px;
            background: #d2b48c;
            border: 10px solid #8b4513;
            position: relative;
        }
        .piece {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            font-weight: bold;
            z-index: 2;
            color: white;
        }
        .piece.red { background: #ff4d4d; }
        .piece.black { background: #333; }
    </style>
</head>
<body>
    <h1>简单测试 - 棋子显示</h1>
    <div id="chessboard"></div>
    <div id="log"></div>
    
    <script>
        try {
            const board = document.getElementById('chessboard');
            const log = document.getElementById('log');
            
            log.innerHTML += '<p>开始创建棋子...</p>';
            
            // 创建测试棋子
            const pieces = [
                { type: '帅', color: 'red', row: 9, col: 4 },
                { type: '将', color: 'black', row: 0, col: 4 },
                { type: '车', color: 'red', row: 9, col: 0 },
                { type: '車', color: 'black', row: 0, col: 0 }
            ];
            
            pieces.forEach(p => {
                const piece = document.createElement('div');
                piece.className = `piece ${p.color}`;
                piece.textContent = p.type;
                const left = 30 + p.col * 60;
                const top = 30 + p.row * 60;
                piece.style.left = `${left}px`;
                piece.style.top = `${top}px`;
                piece.style.transform = 'translate(-50%, -50%)';
                board.appendChild(piece);
                log.innerHTML += `<p>创建棋子: ${p.type}(${p.color}) at ${p.row},${p.col}</p>`;
            });
            
            const count = board.querySelectorAll('.piece').length;
            log.innerHTML += `<p><strong>完成！共 ${count} 颗棋子</strong></p>`;
            
        } catch (e) {
            document.getElementById('log').innerHTML = `<p style="color: red;">错误: ${e.message}</p>`;
            console.error(e);
        }
    </script>
</body>
</html>
