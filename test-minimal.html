<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>最简测试</title>
    <style>
        #chessboard {
            width: 600px;
            height: 660px;
            background: #d2b48c;
            border: 10px solid #8b4513;
            position: relative;
        }
        .piece {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            z-index: 2;
        }
        .piece.red { background: #ff4d4d; color: white; }
        .piece.black { background: #333; color: white; }
    </style>
</head>
<body>
    <h1>最简测试</h1>
    <div id="chessboard">
        <!-- 直接在HTML中创建棋子 -->
        <div class="piece red" style="left: 330px; top: 570px; transform: translate(-50%, -50%);">帅</div>
        <div class="piece black" style="left: 330px; top: 30px; transform: translate(-50%, -50%);">将</div>
        <div class="piece red" style="left: 30px; top: 570px; transform: translate(-50%, -50%);">车</div>
        <div class="piece black" style="left: 30px; top: 30px; transform: translate(-50%, -50%);">車</div>
    </div>
</body>
</html>
