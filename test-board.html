<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试棋盘</title>
    <style>
        #chessboard {
            width: 600px;
            height: 660px;
            background: #d2b48c;
            border: 10px solid #8b4513;
            position: relative;
        }
        
        #chessboard::before {
            content: '';
            position: absolute;
            top: 30px;
            left: 30px;
            right: 30px;
            bottom: 30px;
            background-image: 
                linear-gradient(to right, #000 1px, transparent 1px),
                linear-gradient(to bottom, #000 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }
        
        .piece {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            font-weight: bold;
            z-index: 2;
        }
        
        .piece.red {
            background: #ff4d4d;
            color: white;
        }
        
        .piece.black {
            background: #333;
            color: white;
        }
    </style>
</head>
<body>
    <div id="chessboard"></div>
    
    <script>
        const board = document.getElementById('chessboard');
        
        const testPiece = document.createElement('div');
        testPiece.className = 'piece red';
        testPiece.textContent = '帅';
        testPiece.style.left = '330px';
        testPiece.style.top = '570px';
        testPiece.style.transform = 'translate(-50%, -50%)';
        board.appendChild(testPiece);
        
        const testPiece2 = document.createElement('div');
        testPiece2.className = 'piece black';
        testPiece2.textContent = '将';
        testPiece2.style.left = '330px';
        testPiece2.style.top = '30px';
        testPiece2.style.transform = 'translate(-50%, -50%)';
        board.appendChild(testPiece2);
        
        console.log('测试棋子添加完成');
    </script>
</body>
</html>
