<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试棋子显示</title>
    <style>
        #chessboard {
            width: 600px;
            height: 660px;
            background: #d2b48c;
            border: 10px solid #8b4513;
            border-radius: 5px;
            position: relative;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        
        .piece {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            font-weight: bold;
            cursor: pointer;
            z-index: 2;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            transform: translate(-50%, -50%);
        }
        
        .piece.red {
            background: #ff4d4d;
            color: white;
        }
        
        .piece.black {
            background: #333;
            color: white;
        }
    </style>
</head>
<body>
    <div id="chessboard">
        <!-- 测试红方棋子 -->
        <div class="piece red" style="left: 30px; top: 30px;">車</div>
        <div class="piece red" style="left: 90px; top: 30px;">馬</div>
        <div class="piece red" style="left: 150px; top: 30px;">象</div>
        <div class="piece red" style="left: 210px; top: 30px;">士</div>
        <div class="piece red" style="left: 270px; top: 30px;">将</div>
        
        <!-- 测试黑方棋子 -->
        <div class="piece black" style="left: 30px; top: 630px;">车</div>
        <div class="piece black" style="left: 90px; top: 630px;">马</div>
        <div class="piece black" style="left: 150px; top: 630px;">相</div>
        <div class="piece black" style="left: 210px; top: 630px;">仕</div>
        <div class="piece black" style="left: 270px; top: 630px;">帅</div>
    </div>
</body>
</html>
